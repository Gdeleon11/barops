</div>

<!-- Invite User Modal -->

<!-- Modal Header -->
<div class="px-8 pt-8 pb-4 flex justify-between items-center">
<div class="flex items-center gap-3">
<div class="p-2 bg-primary-container/20 rounded-lg">

</div>
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">Invitar Nuevo Colaborador</h1>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-2 rounded-full hover:bg-surface-container-high">

</div>
<!-- Modal Content -->
<div class="px-8 py-6 space-y-6 max-h-[716px] overflow-y-auto custom-scrollbar">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block">Correo Electrónico</label>
<div class="relative">

</div>

<option>Propietario</option>
<option>Administrador</option>
<option>Gerente</option>

<option>Uptown Lounge</option>
<option>Southside Terrace</option>
<option>Todas las sucursales</option>

<div class="w-10 h-10 rounded-full bg-secondary-container/10 flex items-center justify-center text-secondary">

</div>

<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">settings_input_component</span>
</div>
<div>

</div>
</div>

</label>

<span class="material-symbols-outlined text-[20px]">send</span>

                </button>
</div>
</div>
</div>
<!-- UI Interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Subtle entrance animation for the modal
            const modal = document.querySelector('.glass-panel');
            modal.style.opacity = '0';
            modal.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                modal.style.transition = 'all 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
                modal.style.opacity = '1';
                modal.style.transform = 'translateY(0)';
            }, 100);

            // Simulation of dropdown focus effects
            const inputs = document.querySelectorAll('input, select');
            inputs.forEach(el => {
                el.addEventListener('focus', () => {
                    el.closest('.space-y-2')?.querySelector('label')?.classList.add('text-primary');
                });
                el.addEventListener('blur', () => {
                    el.closest('.space-y-2')?.querySelector('label')?.classList.remove('text-primary');
                });
            });
        });
    </script>
</body></html>
